{% extends 'base.html' %}

{% block title %}Login • Breast Cancer Prediction{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-4 p-md-5">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h2 class="mb-0">Welcome back</h2>
                    <div class="ai-module">
                        <div class="ai-module-core"></div>
                        <div class="ai-module-orbit"></div>
                    </div>
                </div>
                <p class="text-muted mb-4">Sign in to continue to oil spilling dashboard.</p>
                {% if error %}
                <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
                {% endif %}
                <form method="post" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <small class="text-muted">Forgot password?</small>
                        <button type="submit" class="btn btn-gradient">Log in</button>
                    </div>
                </form>
                <p class="mb-0 text-muted">New here?
                    <a href="{{ url_for('register') }}">Create an account</a>
                </p>
                <p class="mt-3 mb-0">
                    <a href="{{ url_for('index') }}">← Back to home</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
