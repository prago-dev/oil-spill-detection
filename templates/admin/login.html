{% extends 'base.html' %}

{% block title %}Admin Login • Oil Spilling{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="glass-card p-4 p-md-5">
                <h2 class="mb-2">Admin sign in</h2>
                <p class="text-muted mb-4 small">Use your admin credentials to access the dashboard.</p>
                <form method="post" action="{{ url_for('admin_login') }}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
                    {% endif %}
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <a href="{{ url_for('index') }}" class="small">← Back to site</a>
                        <button type="submit" class="btn btn-gradient">Log in</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
