<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}User • Project{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-dark: #f1f5f9;
            --accent: #2563eb;
            --accent-alt: #0ea5e9;
            --text-primary: #0f172a;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top, rgba(37, 99, 235, 0.10), transparent 45%), var(--bg-dark);
            color: var(--text-primary);
        }
        .glass-nav {
            background:
                radial-gradient(circle at 0% 0%, rgba(255, 255, 255, 0.24), transparent 55%),
                linear-gradient(120deg, #2563eb, #0ea5e9, #38bdf8, #1d4ed8);
            background-size: 220% 220%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px);
            box-shadow: 0 10px 28px rgba(15, 15, 35, 0.35);
            border-radius: 18px;
            margin-top: 0.75rem;
            margin-inline: 1rem;
            position: relative;
            overflow: hidden;
        }
        .glass-card {
            backdrop-filter: blur(18px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: 1px solid rgba(13, 19, 33, 0.06);
            box-shadow: 0 15px 40px rgba(15, 15, 35, 0.12);
        }
        .btn-gradient {
            background: linear-gradient(120deg, var(--accent), var(--accent-alt));
            border: none;
            border-radius: 14px;
            padding: 0.55rem 1.4rem;
            font-weight: 600;
            box-shadow: 0 10px 26px rgba(37, 99, 235, 0.35);
        }
        .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.78);
            position: relative;
            font-weight: 500;
            letter-spacing: 0.01em;
        }
        .navbar-nav .nav-link.active,
        .navbar-nav .nav-link:hover {
            color: #ffffff;
        }
        .navbar-brand {
            color: #ffffff;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg glass-nav navbar-light sticky-top py-3">
    <div class="container-fluid px-3 px-md-4">
        <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">AI Oil Spilling</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#userNav" aria-controls="userNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="userNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('user_dashboard') }}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('new_prediction') }}">New prediction</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('user_history') }}">History</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('user_profile') }}">Profile</a>
                </li>
                <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                    <a href="{{ url_for('logout') }}" class="btn-gradient d-inline-flex align-items-center gap-1 text-white text-decoration-none">
                        <i class="bi bi-box-arrow-right"></i>
                        <span>Log out</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid py-4 px-3 px-md-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
