<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Oil_spilling{% endblock %}</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>
        html {
            scroll-behavior: smooth;
        }

        :root {
            --bg-dark: #f1f5f9;
            --bg-deep: #ffffff;
            --accent: #2563eb;
            --accent-alt: #0ea5e9;
            --text-primary: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border-glow: rgba(37, 99, 235, 0.25);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, rgba(37, 99, 235, 0.08), transparent 45%), var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .glass-card {
            backdrop-filter: blur(18px);
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.5);
        }

        .glass-card {
            box-shadow: 0 20px 40px rgba(15, 15, 35, 0.12);
        }

        .bg-orbit {
            position: fixed;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            border: 1px solid rgba(37, 99, 235, 0.18);
            box-shadow: 0 0 80px rgba(37, 99, 235, 0.18);
            opacity: 0.5;
            z-index: -1;
            pointer-events: none;
            animation: bg-orbit-spin 40s linear infinite;
        }

        .bg-orbit::before {
            content: "";
            position: absolute;
            inset: 20%;
            border-radius: 50%;
            border: 1px dashed rgba(14, 165, 233, 0.4);
        }

        .bg-orbit-1 {
            top: -120px;
            right: -120px;
        }

        .bg-orbit-2 {
            bottom: -160px;
            left: -80px;
            transform: scale(0.9);
            animation-duration: 55s;
            animation-direction: reverse;
        }

        @keyframes bg-orbit-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glass-nav {
            background:
                radial-gradient(circle at 0% 0%, rgba(255, 255, 255, 0.24), transparent 55%),
                linear-gradient(120deg, #2563eb, #0ea5e9, #38bdf8, #1d4ed8);
            background-size: 220% 220%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px);
            box-shadow: 0 10px 28px rgba(15, 15, 35, 0.35);
            border-radius: 18px;
            margin-top: 0.75rem;
            margin-inline: 1rem;
            position: relative;
            overflow: hidden;
            animation: navGradientShift 14s ease-in-out infinite;
        }

        .glass-nav::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 120% -20%, rgba(255, 255, 255, 0.35), transparent 55%);
            mix-blend-mode: screen;
            opacity: 0.7;
            pointer-events: none;
            animation: navLightSweep 11s linear infinite;
        }

        .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.78);
            position: relative;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .navbar-nav .nav-link.active,
        .navbar-nav .nav-link:hover {
            color: #ffffff;
        }

        .navbar-nav .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0.15rem;
            width: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 999px;
            transition: width 0.25s ease;
        }

        .navbar-nav .nav-link:hover::after,
        .navbar-nav .nav-link.active::after {
            width: 60%;
        }

        .navbar-brand {
            color: #ffffff;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-size: 0.95rem;
        }

        .navbar-toggler {
            border-color: rgba(255, 255, 255, 0.55);
        }

        .navbar-toggler-icon {
            filter: invert(1) contrast(2);
        }

        .btn-outline-light {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.6);
            background-color: transparent;
        }

        .btn-outline-light:hover {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.9);
        }

        @keyframes navGradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes navLightSweep {
            0%   { transform: translateX(-20%); opacity: 0.0; }
            20%  { opacity: 0.7; }
            50%  { transform: translateX(0%); }
            80%  { opacity: 0.0; }
            100% { transform: translateX(20%); opacity: 0.0; }
        }

        @media (max-width: 768px) {
            .ai-spark {
                display: none;
            }
        }
    </style>
</head>
<body>
    {% block extra_head %}{% endblock %}
    <div class="bg-orbit bg-orbit-1"></div>
    <div class="bg-orbit bg-orbit-2"></div>

    <nav class="navbar navbar-expand-lg glass-nav navbar-light sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">AI Oil Spilling</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('login') }}">User</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('admin') }}">Admin</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#support">Support</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Bootstrap Icons & JS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    >
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"
    ></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
